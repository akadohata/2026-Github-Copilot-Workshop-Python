<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー - 視覚的フィードバック強化版</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 背景パーティクルキャンバス -->
    <canvas id="particleCanvas"></canvas>
    
    <!-- 波紋エフェクトコンテナ -->
    <div id="rippleContainer"></div>
    
    <div class="container">
        <header>
            <h1>🍅 ポモドーロタイマー</h1>
            <p class="subtitle">視覚的フィードバック強化版</p>
        </header>
        
        <main>
            <!-- 円形プログレスバー -->
            <div class="timer-container">
                <svg class="progress-ring" viewBox="0 0 200 200">
                    <!-- 背景円 -->
                    <circle class="progress-ring-bg" 
                            cx="100" cy="100" r="90" 
                            fill="none" 
                            stroke="#2a2a3e" 
                            stroke-width="10"/>
                    <!-- プログレスバー（アニメーション） -->
                    <circle id="progressCircle" 
                            class="progress-ring-circle" 
                            cx="100" cy="100" r="90" 
                            fill="none" 
                            stroke="url(#progressGradient)" 
                            stroke-width="10"
                            stroke-linecap="round"
                            transform="rotate(-90 100 100)"/>
                    <!-- グラデーション定義 -->
                    <defs>
                        <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop id="gradientStart" offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
                            <stop id="gradientEnd" offset="100%" style="stop-color:#4a9eff;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
                
                <!-- タイマー表示 -->
                <div class="timer-display">
                    <div id="timeDisplay" class="time">25:00</div>
                    <div id="statusDisplay" class="status">準備完了</div>
                </div>
            </div>
            
            <!-- コントロールボタン -->
            <div class="controls">
                <button id="startBtn" class="btn btn-start">開始</button>
                <button id="pauseBtn" class="btn btn-pause" disabled>一時停止</button>
                <button id="resetBtn" class="btn btn-reset">リセット</button>
            </div>
            
            <!-- セッション情報 -->
            <div class="session-info">
                <div class="info-item">
                    <span class="info-label">モード:</span>
                    <span id="modeDisplay" class="info-value">集中時間</span>
                </div>
                <div class="info-item">
                    <span class="info-label">完了セッション:</span>
                    <span id="sessionCount" class="info-value">0</span>
                </div>
            </div>
        </main>
        
        <footer>
            <p>集中力を高める視覚的エフェクト搭載</p>
        </footer>
    </div>
    
    <script src="{{ url_for('static', filename='js/timer.js') }}"></script>
    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
</body>
</html>
